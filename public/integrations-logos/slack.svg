  <!-- Green -->
  <rect x="98" y="20" width="44" height="96" rx="22" fill="#2EB67D"></rect>
  <rect x="124" y="98" width="96" height="44" rx="22" fill="#2EB67D"></rect>

  <!-- Red -->
  <rect x="20" y="98" width="96" height="44" rx="22" fill="#E01E5A"></rect>
